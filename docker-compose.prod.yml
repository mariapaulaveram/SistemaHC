version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: historias_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal

  web:
    build: .
    restart: always
    environment:
      DATABASE_URL: postgresql://user:${DB_PASSWORD}@db:5432/historias_db
      SECRET_KEY: ${SECRET_KEY}
      UPLOADS_DIR: /uploads
    volumes:
      - uploads_data:/uploads
    depends_on:
      - db
    networks:
      - internal
      - public

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - public

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renovación automática cada 12 horas
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres_data:
  uploads_data:
  certbot_www:
  certbot_conf:

networks:
  internal:
  public:
